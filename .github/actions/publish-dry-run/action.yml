name: Publish (dry-run)
description: "Perform a dry-run of publishing crates to crates.io to check for potential issues before actual publication."
runs:
  using: "composite"
  steps:
    - name: Publish (dry-run)
      run: |
        cargo publish --locked -p terrazzo-pty --dry-run
        cargo publish --locked -p terrazzo-terminal --dry-run
      shell: bash
